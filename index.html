<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tops daily task</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tops daily task">
  <link rel="apple-touch-icon" href="icon.png"> 
  <link rel="icon" type="image/png" href="icon.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  
  <style>
    body { background-color: #f4f7f6; font-family: 'Segoe UI', Roboto, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
    .navbar { background: linear-gradient(90deg, #d32f2f 0%, #e53935 100%); color: white; padding-top: env(safe-area-inset-top); }
    
    .task-card { border-radius: 14px; border: none; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .task-card:active { transform: scale(0.97); }
    .urgent-card { border-left: 6px solid #dc3545; background: linear-gradient(to right, #fffcfc, #ffffff); box-shadow: 0 4px 10px rgba(220,53,69,0.1); }
    .normal-card { border-left: 6px solid #0d6efd; background: #ffffff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .done-card { border-left: 6px solid #198754; background: #f8f9fa; opacity: 0.7; }
    
    .mic-btn { cursor: pointer; color: #d32f2f; font-size: 1rem; transition: 0.3s; padding: 5px 10px; border-radius: 20px; background: #ffeeee; font-weight: 500; }
    .mic-btn.recording { color: white; background: #dc3545; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); } }
    
    .form-control, .form-select { border-radius: 8px; border: 1px solid #ced4da; padding: 10px 15px; }
    label.fw-bold { color: #343a40; font-size: 0.95rem; }
    
    .fab-container { position: fixed; bottom: 30px; right: 20px; z-index: 1040; }
    .fab-btn { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #d32f2f, #b71c1c); color: white; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 15px rgba(211, 47, 47, 0.4); font-size: 1.5rem; border: none; }
    .fab-btn:active { transform: scale(0.9); }
    
    #canvasContainer { overflow: hidden; background-color: #fff; background-image: radial-gradient(#d3d3d3 1px, transparent 1px); background-size: 20px 20px; }
    #drawingCanvas { display: block; touch-action: none; cursor: crosshair; }
    
    /* สไตล์ปฏิทิน */
    .fc-toolbar-title { font-size: 1.1rem !important; color: #d32f2f; font-weight: bold; }
    .fc-button { padding: 0.3rem 0.5rem !important; font-size: 0.85rem !important; }
    .fc-button-primary { background-color: #d32f2f !important; border-color: #d32f2f !important; }
    .fc-event { cursor: pointer; font-size: 0.8rem; border: none; padding: 3px; border-radius: 4px; font-weight: bold; letter-spacing: 0.2px; }
    .fc-daygrid-day-frame { cursor: pointer; transition: 0.2s; min-height: 60px !important; }
    .fc-daygrid-day-frame:active { background-color: #f8d7da; }
    .fc-list-event-title { font-size: 0.9rem; } /* ขนาดฟอนต์สำหรับ List view */
  </style>
</head>
<body>

  <nav class="navbar navbar-dark mb-3 p-3 shadow-sm sticky-top">
    <div class="container-fluid d-flex align-items-center">
      <div>
        <button class="btn btn-link text-white p-0 me-3 border-0" type="button" onclick="openSidebarMenu()">
          <i class="fa-solid fa-bars fs-4"></i>
        </button>
        <span class="navbar-brand mb-0 h5 fw-bold" style="cursor: pointer;" onclick="showSection('dashboard-sec'); setFilterStatus('หน้าแรก');">
          Tops daily task
        </span>
      </div>
    </div>
  </nav>

  <div class="fab-container" id="fabMain">
    <button class="fab-btn" onclick="showSection('add-task-sec')"><i class="fa-solid fa-plus"></i></button>
  </div>

  <div class="offcanvas offcanvas-start border-0 shadow" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header bg-light border-bottom">
      <h6 class="offcanvas-title fw-bold text-dark"><i class="fa-solid fa-layer-group me-2 text-danger"></i>เมนูหลัก</h6>
      <button type="button" class="btn-close" onclick="closeSidebarMenu()"></button>
    </div>
    <div class="offcanvas-body p-0 d-flex flex-column h-100">
      <div class="list-group list-group-flush mt-2 flex-grow-1">
        <button class="list-group-item list-group-item-action py-3 fw-bold text-primary border-0" onclick="showSection('calendar-sec'); closeSidebarMenu()">
          <i class="fa-solid fa-calendar-days me-3 w-20px text-center"></i> ปฏิทินงาน
        </button>
        <button class="list-group-item list-group-item-action py-3 fw-bold text-danger border-0" onclick="showSection('dashboard-sec'); setFilterStatus('หน้าแรก'); closeSidebarMenu()">
          <i class="fa-solid fa-bolt me-3 w-20px text-center"></i> สรุปงานสำคัญ
        </button>
        <button class="list-group-item list-group-item-action py-3 border-0 text-dark" onclick="showSection('dashboard-sec'); setFilterStatus('งานใหม่'); closeSidebarMenu()">
          <i class="fa-solid fa-asterisk fa-spin me-3 w-20px text-center text-info"></i> งานใหม่
        </button>
        <button class="list-group-item list-group-item-action py-3 border-0 text-dark" onclick="showSection('dashboard-sec'); setFilterStatus('กำลังดำเนินงาน'); closeSidebarMenu()">
          <i class="fa-solid fa-spinner fa-spin-pulse me-3 w-20px text-center text-warning"></i> กำลังดำเนินงาน
        </button>
        <button class="list-group-item list-group-item-action py-3 border-0 text-dark" onclick="showSection('dashboard-sec'); setFilterStatus('เสร็จสิ้น'); closeSidebarMenu()">
          <i class="fa-solid fa-circle-check me-3 w-20px text-center text-success"></i> เสร็จสิ้น
        </button>
      </div>
      <div class="list-group list-group-flush border-top">
        <button class="list-group-item list-group-item-action py-3 border-0 text-secondary fw-bold" onclick="showSection('dashboard-sec'); setFilterStatus('ถูกลบ'); closeSidebarMenu()">
          <i class="fa-solid fa-trash-can me-3 w-20px text-center"></i> ถังขยะ (งานที่ถูกลบ)
        </button>
      </div>
    </div>
  </div>

  <div class="container pb-5">
    
    <div id="calendar-sec" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold text-dark"><i class="fa-solid fa-calendar-days text-primary me-2"></i>ภาพรวมปฏิทิน</h5>
        <small class="text-muted"><i class="fa-solid fa-hand-pointer"></i> แตะวันที่เพื่อเพิ่มงาน</small>
      </div>
      <div class="card shadow-sm border-0 rounded-4 p-2 bg-white mb-4">
        <div id="calendar"></div>
      </div>
    </div>

    <div id="dashboard-sec">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="mb-0 fw-bold text-dark" id="dashboard-title"><i class="fa-solid fa-bolt text-danger me-2"></i>สรุปงานสำคัญ</h5>
      </div>
      <div class="input-group mb-3 shadow-sm rounded-3">
        <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-filter"></i></span>
        <select id="branchFilter" class="form-select border-start-0" onchange="applyFilters()">
          <option value="">แสดงทุกสาขา</option>
        </select>
      </div>
      <div id="task-list" class="row gy-2">
        <div class="text-center text-muted mt-5"><div class="spinner-border text-danger mb-2"></div><p>กำลังเชื่อมต่อข้อมูล...</p></div>
      </div>
    </div>

    <div id="add-task-sec" class="card shadow-sm border-0 d-none rounded-4 mb-5">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="card-title mb-0 fw-bold text-dark">สร้างงานใหม่</h5>
          <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" onclick="showSection('dashboard-sec')">ยกเลิก</button>
        </div>
        <form id="taskForm" onsubmit="submitTask(event)">
          <div class="mb-3">
            <label class="form-label fw-bold">หัวข้อรายการ</label>
            <input type="text" class="form-control" id="f_title" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">สาขาที่ปฏิบัติงาน</label>
            <select class="form-select" id="f_branch" onchange="autoSelectFormat()" required><option value="">-- เลือกสาขา --</option></select>
          </div>
          <div class="d-none"><select id="f_format"><option value=""></option><option value="CO">CO</option><option value="FC">FC</option></select></div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label fw-bold">กำหนดเสร็จ</label>
              <input type="date" class="form-control" id="f_deadline" required>
            </div>
            <div class="col-6 mb-3">
              <label class="form-label fw-bold text-primary"><i class="fa-regular fa-clock"></i> เวลา</label>
              <input type="time" class="form-control border-primary" id="f_time" required>
            </div>
            <div class="col-12 mb-3">
              <label class="form-label fw-bold">ระดับความสำคัญ</label>
              <select class="form-select" id="f_priority" required>
                <option value="สูง">🔴 สูง (เร่งด่วน)</option>
                <option value="ปานกลาง">🟡 ปานกลาง</option>
                <option value="ต่ำ">🟢 ต่ำ</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">แผนกผู้รับผิดชอบ</label>
            <input type="text" class="form-control" id="f_department" list="deptOptions" placeholder="พิมพ์ชื่อแผนก..." required autocomplete="off">
            <datalist id="deptOptions"></datalist>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold d-flex justify-content-between align-items-center w-100">
              รายละเอียด
              <span class="mic-btn shadow-sm" id="micBtn" onclick="toggleMic()"><i class="fa-solid fa-microphone"></i> พูดจดโน้ต</span>
            </label>
            <textarea class="form-control mb-3" id="f_details" rows="3" placeholder="ระบุรายละเอียด..."></textarea>
            
            <button type="button" class="btn btn-outline-primary w-100 py-2 fw-bold" onclick="openDrawModal()" style="border-radius: 8px; border-style: dashed;">
              <i class="fa-solid fa-signature me-2"></i> วาด/เซ็น ลายมือ
            </button>
            <div id="drawPreviewContainer" class="mt-3 text-center d-none position-relative bg-light border rounded-3 p-2">
              <img id="drawPreview" src="" class="img-fluid rounded shadow-sm" style="max-height: 120px;">
              <button type="button" class="btn btn-danger btn-sm position-absolute top-0 end-0 m-2 rounded-circle shadow" onclick="removeDrawing()"><i class="fa-solid fa-xmark"></i></button>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold"><i class="fa-solid fa-image"></i> ภาพถ่ายประกอบ</label>
            <input type="file" class="form-control" id="f_image" accept="image/*">
          </div>
          <button type="submit" class="btn btn-danger w-100 fw-bold py-2 rounded-pill shadow-sm" id="saveBtn">
            <i class="fa-solid fa-cloud-arrow-up me-2"></i> บันทึกข้อมูล
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="drawModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white p-3 border-0">
          <h5 class="modal-title fw-bold"><i class="fa-solid fa-pen-nib text-warning me-2"></i> กระดานจดโน้ต</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0 position-relative" id="canvasContainer">
          <canvas id="drawingCanvas"></canvas>
        </div>
        <div class="modal-footer bg-light p-3 d-flex justify-content-between">
          <button type="button" class="btn btn-outline-danger fw-bold" onclick="clearCanvas()"><i class="fa-solid fa-eraser me-1"></i> ลบกระดาน</button>
          <button type="button" class="btn btn-primary fw-bold px-4 shadow-sm" onclick="saveDrawing()"><i class="fa-solid fa-check me-1"></i> ยืนยัน</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0 shadow-lg rounded-4">
        <div class="modal-header bg-light border-bottom-0 pb-0 pt-4 px-4">
          <h5 class="modal-title fw-bold text-dark">จัดการงาน</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body px-4 pt-3">
          <div class="bg-light p-3 rounded-3 mb-3 border">
            <div class="row mb-1"><div class="col-4 text-muted small">สาขา:</div><div class="col-8 fw-bold text-dark"><span id="m_branch"></span></div></div>
            <div class="row"><div class="col-4 text-muted small">กำหนดส่ง:</div><div class="col-8 fw-bold text-secondary"><i class="fa-regular fa-calendar me-1"></i> <span id="m_deadline"></span></div></div>
          </div>
          <input type="hidden" id="m_row">
          <div class="mb-3"><label class="fw-bold text-dark small mb-1">หัวข้อรายการ</label><input type="text" id="m_title_edit" class="form-control bg-white"></div>
          <div class="row mb-3">
            <div class="col-6">
              <label class="fw-bold text-dark small mb-1">สถานะ</label>
              <select id="m_status_edit" class="form-select bg-white fw-bold border-primary text-primary">
                <option value="งานใหม่">งานใหม่</option>
                <option value="เปิดงานใหม่" class="d-none">เปิดงานใหม่</option>
                <option value="กำลังดำเนินงาน">กำลังดำเนินงาน</option>
                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
                <option value="ถูกลบ">ถูกลบ (ถังขยะ)</option>
              </select>
            </div>
            <div class="col-6"><label class="fw-bold text-dark small mb-1">เวลา</label><input type="time" id="m_time_edit" class="form-control bg-white border-primary"></div>
          </div>
          <div class="mb-3"><label class="fw-bold text-dark small mb-1">รายละเอียด</label><textarea id="m_details_edit" class="form-control bg-white" rows="3"></textarea></div>
          <div id="m_image_container" class="mt-2 text-center d-none">
            <label class="fw-bold text-dark small d-block text-start mb-2">ภาพประกอบ (แตะรูปเพื่อขยาย)</label>
            <img id="m_image" src="" class="img-fluid rounded-3 border shadow-sm clickable-img mb-2" style="max-height: 150px;" onclick="viewFullImage(this.src)">
            <img id="m_draw_image" src="" class="img-fluid rounded-3 border shadow-sm clickable-img d-none" style="max-height: 150px;" onclick="viewFullImage(this.src)">
          </div>
        </div>
        <div class="modal-footer border-top-0 px-4 pb-4 d-flex">
          <button type="button" class="btn btn-outline-danger fw-bold py-2 rounded-pill shadow-sm" onclick="deleteTaskAction()" id="modalDeleteBtn"><i class="fa-solid fa-trash-can"></i> ลบ</button>
          <button type="button" class="btn btn-dark flex-grow-1 fw-bold py-2 rounded-pill shadow-sm ms-2" onclick="saveTaskEdit()" id="modalSaveBtn"><i class="fa-solid fa-floppy-disk me-2"></i> บันทึก</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="imageViewerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content bg-transparent border-0"><div class="modal-body text-center position-relative p-0"><button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-2 bg-dark shadow rounded-circle p-2" data-bs-dismiss="modal"></button><img id="fullImageSrc" src="" class="img-fluid rounded-3 shadow-lg" style="max-height: 90vh;"></div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 🔴🔴🔴 นำ URL จาก Apps Script มาวางที่นี่ 🔴🔴🔴
    const API_URL = "https://script.google.com/macros/s/AKfycbwBFTLE8Q_7T63l6dzkZuqqmsRnQvQRby0H6tcICOH9Ld2onRTJ00bYQ9jDGTJaC9bdDg/exec";

    const rawBranches = ["5285 แฟลตทหารเรือบางนา", "4697 พระราม 9 ซอย 49", "0877 ลาดพร้าว 102", "5291 บ้านเทพารักษ์", "4278 ลาดพร้าว 132", "3118 ซอยเทพารักษ์ 8", "5298 ฟู้ด สต็อก พัฒนาการ 32", "5219 เฉลิมพระเกียรติ 30 แยก 14", "5209 ซอย กุศลศิลป์", "0730 ซอย เพี้ยนพิณ 2", "6953 บางจากบางนาตราด ก.ม.7", "3104 เสรีอ่อนนุชวิลเลจ", "6731 คาลเท็กซ์ ศรีนครินทร์", "4802 บางนา - ตราด กม.8", "3110 บางนาตราด กม. 6.5", "3100 เฉลิมพระเกียรติ 14 แยก 34", "3106 ท็อปส์ เดลี่ เดอะพาร์คแลนด์", "3119 รามคำแหง 29.2", "2288 รามคำแหง 8 แยก 4"];
    const standardDepartments = ["IT (ไอที)", "HR (บุคคล)", "Accounting (บัญชี)", "Finance (การเงิน)", "Marketing (การตลาด)", "Operations (ปฏิบัติการ)", "Purchasing (จัดซื้อ)", "Maintenance (ซ่อมบำรุง)", "Construction (ก่อสร้าง)", "Legal (กฎหมาย)", "Logistics (ขนส่ง)", "Customer Service (บริการลูกค้า)", "QA/QC (ตรวจสอบคุณภาพ)"];

    let allTasksData = [];
    let currentStatusFilter = 'หน้าแรก';
    let selectedDateFilter = null; 
    let currentDrawBase64 = ""; 
    let isCanvasDrawn = false;
    let calendar; 
    let currentCalView = window.innerWidth < 768 ? 'listMonth' : 'dayGridMonth'; // กำหนดค่าเริ่มต้นตามขนาดจอ
    let bsOffcanvas;

    document.addEventListener('DOMContentLoaded', () => {
      bsOffcanvas = new bootstrap.Offcanvas(document.getElementById('sidebarMenu'));
      rawBranches.sort();
      const branchSelect = document.getElementById('f_branch');
      const dashboardBranchSelect = document.getElementById('branchFilter');
      rawBranches.forEach(b => {
        branchSelect.appendChild(new Option(b, b));
        dashboardBranchSelect.appendChild(new Option(b, b));
      });
      loadTasks();
      initCanvas(); 
    });

    function openSidebarMenu() { bsOffcanvas.show(); }
    function closeSidebarMenu() { bsOffcanvas.hide(); }

    function autoSelectFormat() {
      const branchStr = document.getElementById('f_branch').value;
      const formatSelect = document.getElementById('f_format');
      if (!branchStr) { formatSelect.value = ''; return; }
      formatSelect.value = (['1', '2', '3'].includes(branchStr.replace(/^0+/, '').charAt(0))) ? 'FC' : 'CO';
    }

    function showSection(id) {
      document.getElementById('dashboard-sec').classList.add('d-none');
      document.getElementById('add-task-sec').classList.add('d-none');
      document.getElementById('calendar-sec').classList.add('d-none'); 
      document.getElementById(id).classList.remove('d-none');
      document.getElementById('fabMain').style.display = (id === 'add-task-sec') ? 'none' : 'flex';
      
      if(id === 'dashboard-sec') applyFilters();
      if(id === 'calendar-sec') {
        setTimeout(() => {
          if(!calendar) initCalendar();
          calendar.render(); 
          updateCalendarEvents();
        }, 100);
      }
    }

    /* --- 🔴 ระบบปฏิทินที่แยกความฉลาดแบบ Grid และ List --- */
    function initCalendar() {
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: currentCalView,
        locale: 'th',
        headerToolbar: { 
          left: 'prev,next', 
          center: 'title', 
          right: window.innerWidth < 768 ? 'dayGridMonth,listMonth' : 'dayGridMonth,timeGridWeek,listMonth' 
        },
        height: 'auto',
        contentHeight: 'auto',
        events: [],
        
        // 🔴 ฟังก์ชันจับการเปลี่ยนมุมมอง เพื่อให้ระบบวาดข้อมูลใหม่
        datesSet: function(info) {
          if (currentCalView !== info.view.type) {
            currentCalView = info.view.type;
            updateCalendarEvents();
          }
        },
        
        // 🔴 ฟังก์ชันกดดูข้อมูล
        eventClick: function(info) { 
          if (info.event.extendedProps.isGroup) {
            // ถ้าอยู่แบบตาราง (ยุบรวม) -> กดแล้วพาไปหน้า Dashboard โชว์เฉพาะวันนั้น
            selectedDateFilter = info.event.extendedProps.dateStr;
            showSection('dashboard-sec');
            setFilterStatus('ตามวันที่');
            window.scrollTo(0, 0);
          } else {
            // ถ้าอยู่แบบ List -> กดแล้วเด้งหน้าต่างรายละเอียดงานทันที
            openTaskModal(info.event.extendedProps.task);
          }
        },
        
        dateClick: function(info) {
          showSection('add-task-sec');
          document.getElementById('f_deadline').value = info.dateStr; 
          window.scrollTo(0, 0); 
        }
      });
      calendar.render();
    }

    function updateCalendarEvents() {
      if (!calendar) return;
      calendar.removeAllEvents();
      
      let activeTasks = allTasksData.filter(t => t.status !== 'ถูกลบ' && t.status !== 'เสร็จสิ้น');
      let events = [];

      // 🔴 เงื่อนไขความฉลาด: ถ้าเป็นตารางเดือนให้ยุบรวม / ถ้าเป็นแบบอื่น(List/Week)ให้กางเต็ม
      if (currentCalView === 'dayGridMonth') {
        let tasksByDate = {};
        activeTasks.forEach(t => {
          let d = new Date(t.deadline);
          let dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          if(!tasksByDate[dateStr]) tasksByDate[dateStr] = [];
          tasksByDate[dateStr].push(t);
        });

        for (let dateStr in tasksByDate) {
          let dailyTasks = tasksByDate[dateStr];
          let firstBranchCode = dailyTasks[0].branch.split(' ')[0]; 
          
          let title = firstBranchCode;
          if (dailyTasks.length > 1) {
            title += ` (+${dailyTasks.length - 1})`;
          }

          let hasHigh = dailyTasks.some(t => t.priority === 'สูง');
          let hasMed = dailyTasks.some(t => t.priority === 'ปานกลาง');
          let evtColor = hasHigh ? '#dc3545' : (hasMed ? '#ffc107' : '#0d6efd');

          events.push({
            title: title,
            start: dateStr, // ใช้แค่วันที่ เพื่อให้เต็มช่อง
            color: evtColor,
            extendedProps: { isGroup: true, dateStr: dateStr }
          });
        }
      } else {
        // 🔴 แบบรายการ (List View) กางข้อมูลออกมาเต็มรูปแบบ
        activeTasks.forEach(t => {
          let evtColor = t.priority === 'สูง' ? '#dc3545' : (t.priority === 'ปานกลาง' ? '#ffc107' : '#0d6efd');
          let d = new Date(t.deadline);
          let dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          
          // ใส่รหัสสาขา, ชื่อหัวข้อ และแผนก ให้ครบถ้วน
          events.push({
            title: `[รหัส: ${t.branch.split(' ')[0]}] ${t.title} - (แผนก: ${t.department})`,
            start: t.time ? `${dateStr}T${t.time}` : dateStr,
            color: evtColor,
            extendedProps: { task: t, isGroup: false, dateStr: dateStr }
          });
        });
      }

      calendar.addEventSource(events);
    }

    function updateDepartmentSuggestion() {
      const dbDepts = allTasksData.map(t => t.department).filter(d => d.trim() !== '');
      document.getElementById('deptOptions').innerHTML = [...new Set([...standardDepartments, ...dbDepts])].sort().map(d => `<option value="${d}">`).join('');
    }

    function loadTasks() {
      const list = document.getElementById('task-list');
      list.innerHTML = `<div class="text-center text-muted mt-5"><div class="spinner-border text-danger mb-2"></div><p>กำลังโหลดข้อมูล...</p></div>`;
      fetch(API_URL).then(res => res.json()).then(tasks => {
        if (tasks.error) return;
        allTasksData = tasks;
        updateDepartmentSuggestion(); 
        if(!document.getElementById('calendar-sec').classList.contains('d-none')) updateCalendarEvents();
        applyFilters(); 
      }).catch(err => { list.innerHTML = `<div class="alert alert-danger shadow-sm border-0">เชื่อมต่อไม่ได้</div>`; });
    }

    function setFilterStatus(status) {
      currentStatusFilter = status;
      let titleIcon = '';
      if(status === 'หน้าแรก') titleIcon = '<i class="fa-solid fa-bolt text-danger me-2"></i>สรุปงานสำคัญ';
      else if(status === 'ถูกลบ') titleIcon = '<i class="fa-solid fa-trash-can text-secondary me-2"></i>ถังขยะ';
      else if(status === 'งานใหม่') titleIcon = '<i class="fa-solid fa-asterisk text-info me-2"></i>งานใหม่';
      else if(status === 'กำลังดำเนินงาน') titleIcon = '<i class="fa-solid fa-spinner text-warning me-2"></i>ดำเนินการ';
      else if(status === 'เสร็จสิ้น') titleIcon = '<i class="fa-solid fa-check text-success me-2"></i>เสร็จสิ้น';
      else if(status === 'ตามวันที่') {
        let d = new Date(selectedDateFilter);
        titleIcon = `<i class="fa-regular fa-calendar-check text-primary me-2"></i>งานประจำวันที่ ${d.toLocaleDateString('th-TH')}`;
      }
      document.getElementById('dashboard-title').innerHTML = titleIcon;
      applyFilters();
    }

    function applyFilters() {
      const branchVal = document.getElementById('branchFilter').value;
      let filtered = allTasksData;
      if (branchVal !== '') filtered = filtered.filter(t => t.branch === branchVal);
      
      if (currentStatusFilter === 'หน้าแรก') {
        filtered = filtered.filter(t => t.status !== 'เสร็จสิ้น' && t.status !== 'ถูกลบ').slice(0, 10); 
      } else if (currentStatusFilter === 'ตามวันที่') {
        filtered = filtered.filter(t => {
          if (t.status === 'ถูกลบ' || t.status === 'เสร็จสิ้น') return false;
          let d = new Date(t.deadline);
          let dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          return dateStr === selectedDateFilter;
        });
      } else {
        filtered = filtered.filter(t => t.status === currentStatusFilter || (currentStatusFilter === 'งานใหม่' && t.status === 'เปิดงานใหม่'));
      }
      renderTasks(filtered);
    }

    function buildCardHtml(task, isUrgent) {
      let statusBadge = task.status === 'ถูกลบ' ? '<span class="badge bg-secondary">ถูกลบ</span>' :
                        task.status.includes('ใหม่') ? '<span class="badge bg-info text-dark">งานใหม่</span>' :
                        task.status === 'เสร็จสิ้น' ? '<span class="badge bg-success">เสร็จสิ้น</span>' :
                        '<span class="badge bg-warning text-dark">ดำเนินการ</span>';

      let prioColor = task.priority === 'สูง' ? 'danger' : (task.priority === 'ปานกลาง' ? 'warning text-dark' : 'success');
      let priorityBadge = `<span class="badge bg-${prioColor}">${task.priority}</span>`;

      let deadlineStr = new Date(task.deadline).toLocaleDateString('th-TH');
      let timeTxt = task.time ? ` ${task.time} น.` : '';
      let daysLeft = Math.ceil((new Date(task.deadline) - new Date()) / (1000 * 60 * 60 * 24));
      
      let timeLeftHtml = '';
      if (task.status === 'เสร็จสิ้น') timeLeftHtml = `<span class="text-success fw-bold small"><i class="fa-solid fa-check-circle"></i> ปิดงานแล้ว</span>`;
      else if (task.status === 'ถูกลบ') timeLeftHtml = `<span class="text-secondary fw-bold small"><i class="fa-solid fa-ban"></i> ยกเลิกแล้ว</span>`;
      else if (daysLeft < 0) timeLeftHtml = `<span class="text-danger fw-bold small"><i class="fa-solid fa-triangle-exclamation fa-fade"></i> ช้ากว่ากำหนด ${Math.abs(daysLeft)} วัน</span>`;
      else if (daysLeft === 0) timeLeftHtml = `<span class="text-danger fw-bold small"><i class="fa-solid fa-clock fa-shake"></i> กำหนดส่งวันนี้!</span>`;
      else if (daysLeft <= 2) timeLeftHtml = `<span class="text-warning text-dark fw-bold small"><i class="fa-solid fa-bell fa-shake"></i> เหลือ ${daysLeft} วัน</span>`;
      else timeLeftHtml = `<span class="text-muted fw-bold small"><i class="fa-regular fa-calendar"></i> อีก ${daysLeft} วัน</span>`;

      let hasImage = (task.imageUrl || task.drawUrl) ? ' <i class="fa-solid fa-paperclip text-primary ms-1"></i>' : '';
      let cardStyleClass = task.status === 'เสร็จสิ้น' ? 'done-card' : (isUrgent ? 'urgent-card' : 'normal-card');
      let colClass = isUrgent ? 'col-12' : 'col-12 col-md-6';

      return `
        <div class="${colClass}">
          <div class="card task-card p-3 shadow-sm ${cardStyleClass}" onclick='openTaskModal(${JSON.stringify(task)})'>
            <div class="d-flex justify-content-between align-items-center mb-2">
              <div class="d-flex gap-2">${statusBadge} ${priorityBadge}</div>
              ${timeLeftHtml}
            </div>
            <h6 class="fw-bold text-dark lh-base mb-1">${task.title}${hasImage}</h6>
            <div class="d-flex justify-content-between align-items-end mt-2">
              <span class="text-muted small text-truncate pe-2" style="max-width:60%;"><i class="fa-solid fa-location-dot text-danger me-1"></i> ${task.branch}</span>
              <span class="text-secondary small fw-bold"><i class="fa-regular fa-clock me-1"></i> ${deadlineStr}${timeTxt}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderTasks(tasks) {
      const list = document.getElementById('task-list');
      if (tasks.length === 0) { list.innerHTML = `<div class="col-12 mt-4 text-center text-muted"><div class="bg-white p-5 rounded-4 shadow-sm border"><i class="fa-regular fa-folder-open fs-1 mb-3"></i><h6 class="mb-0">ไม่มีงานค้าง</h6></div></div>`; return; }
      
      let html = '';
      if (currentStatusFilter === 'หน้าแรก') {
        let urgentHtml = '', normalHtml = '';
        tasks.filter(t => t.status !== 'เสร็จสิ้น' && t.status !== 'ถูกลบ').forEach(task => {
          let daysLeft = Math.ceil((new Date(task.deadline) - new Date()) / (1000 * 60 * 60 * 24));
          let isUrgent = daysLeft <= 2; 
          if(isUrgent) urgentHtml += buildCardHtml(task, true);
          else normalHtml += buildCardHtml(task, false);
        });
        if (urgentHtml) html += `<div class="col-12 mt-1 mb-1"><h6 class="fw-bold text-danger small"><i class="fa-solid fa-bolt me-1"></i> ต้องรีบจัดการ</h6></div>` + urgentHtml;
        if (normalHtml) html += `<div class="col-12 mt-3 mb-1"><h6 class="fw-bold text-secondary small"><i class="fa-regular fa-calendar-check me-1"></i> งานที่กำลังมาถึง</h6></div>` + normalHtml;
      } else {
        tasks.forEach(task => html += buildCardHtml(task, false));
      }
      list.innerHTML = html;
    }

    const taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
    function openTaskModal(task) {
      document.getElementById('m_row').value = task.row;
      document.getElementById('m_branch').innerText = task.branch;
      let deadlineStr = new Date(task.deadline).toLocaleDateString('th-TH');
      let timeDisplayTxt = task.time ? ` เวลา ${task.time} น.` : '';
      document.getElementById('m_deadline').innerText = `${deadlineStr}${timeDisplayTxt}`;
      document.getElementById('m_title_edit').value = task.title;
      document.getElementById('m_details_edit').value = task.details;
      document.getElementById('m_status_edit').value = task.status;
      document.getElementById('m_time_edit').value = task.time; 
      
      const imgContainer = document.getElementById('m_image_container');
      const imgElement = document.getElementById('m_image');
      const drawElement = document.getElementById('m_draw_image');
      let showContainer = false;
      if (task.imageUrl) { imgElement.src = task.imageUrl; imgElement.classList.remove('d-none'); showContainer = true; } else { imgElement.classList.add('d-none'); }
      if (task.drawUrl) { drawElement.src = task.drawUrl; drawElement.classList.remove('d-none'); showContainer = true; } else { drawElement.classList.add('d-none'); }
      if(showContainer) imgContainer.classList.remove('d-none'); else imgContainer.classList.add('d-none');
      taskModal.show();
    }

    const imageViewerModal = new bootstrap.Modal(document.getElementById('imageViewerModal'));
    function viewFullImage(src) { document.getElementById('fullImageSrc').src = src; imageViewerModal.show(); }

    function saveTaskEdit() {
      const btn = document.getElementById('modalSaveBtn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>บันทึก...'; btn.disabled = true;
      const updatedData = {
        row: document.getElementById('m_row').value, title: document.getElementById('m_title_edit').value,
        status: document.getElementById('m_status_edit').value, details: document.getElementById('m_details_edit').value, time: document.getElementById('m_time_edit').value 
      };
      fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateTask', taskData: updatedData }) })
      .then(() => { taskModal.hide(); loadTasks(); })
      .finally(() => { btn.innerHTML = '<i class="fa-solid fa-floppy-disk me-2"></i> บันทึก'; btn.disabled = false; });
    }

    function deleteTaskAction() {
      if(!confirm("แน่ใจหรือไม่ว่าต้องการลบงานนี้? (สามารถกู้คืนได้ที่ถังขยะ)")) return;
      const btn = document.getElementById('modalDeleteBtn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btn.disabled = true;
      fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteTask', rowNumber: document.getElementById('m_row').value }) })
      .then(() => { taskModal.hide(); loadTasks(); })
      .finally(() => { btn.innerHTML = '<i class="fa-solid fa-trash-can"></i> ลบ'; btn.disabled = false; });
    }

    /* --- Canvas Logic --- */
    const drawModalEl = document.getElementById('drawModal');
    const drawModal = new bootstrap.Modal(drawModalEl);
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    function openDrawModal() { drawModal.show(); }
    drawModalEl.addEventListener('shown.bs.modal', function () { resizeCanvas(); });
    function initCanvas() {
      canvas.addEventListener('mousedown', startPosition); canvas.addEventListener('mouseup', endPosition); canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('touchstart', startPositionTouch, {passive: false}); canvas.addEventListener('touchend', endPosition); canvas.addEventListener('touchmove', drawTouch, {passive: false});
    }
    function resizeCanvas() {
      const container = document.getElementById('canvasContainer'); canvas.width = container.clientWidth; canvas.height = container.clientHeight;
      ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#d32f2f'; 
      if(currentDrawBase64) { let img = new Image(); img.onload = function() { ctx.drawImage(img, 0, 0); }; img.src = currentDrawBase64; } else { clearCanvas(); }
    }
    function clearCanvas() { ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height); isCanvasDrawn = false; currentDrawBase64 = ""; }
    function getMousePos(evt) { const rect = canvas.getBoundingClientRect(); return { x: evt.clientX - rect.left, y: evt.clientY - rect.top }; }
    function getTouchPos(evt) { const rect = canvas.getBoundingClientRect(); return { x: evt.touches[0].clientX - rect.left, y: evt.touches[0].clientY - rect.top }; }
    function startPosition(e) { isDrawing = true; draw(e); }
    function startPositionTouch(e) { e.preventDefault(); isDrawing = true; drawTouch(e); }
    function endPosition() { isDrawing = false; ctx.beginPath(); }
    function draw(e) { if (!isDrawing) return; isCanvasDrawn = true; const pos = getMousePos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function drawTouch(e) { if (!isDrawing) return; e.preventDefault(); isCanvasDrawn = true; const pos = getTouchPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function saveDrawing() {
      if(isCanvasDrawn) { currentDrawBase64 = canvas.toDataURL('image/png'); document.getElementById('drawPreview').src = currentDrawBase64; document.getElementById('drawPreviewContainer').classList.remove('d-none'); } else { removeDrawing(); }
      drawModal.hide();
    }
    function removeDrawing() { currentDrawBase64 = ""; isCanvasDrawn = false; document.getElementById('drawPreviewContainer').classList.add('d-none'); clearCanvas(); }

    function compressImage(file, callback) {
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = e => {
        const img = new Image(); img.src = e.target.result;
        img.onload = () => {
          const canvasImg = document.createElement('canvas'); const scale = Math.min(800 / img.width, 800 / img.height, 1);
          canvasImg.width = img.width * scale; canvasImg.height = img.height * scale;
          const ctxImg = canvasImg.getContext('2d'); ctxImg.drawImage(img, 0, 0, canvasImg.width, canvasImg.height);
          callback(canvasImg.toDataURL('image/jpeg', 0.7));
        }
      }
    }

    function submitTask(e) {
      e.preventDefault();
      const btn = document.getElementById('saveBtn'); 
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>บันทึกข้อมูล...'; btn.disabled = true;
      const data = {
        title: document.getElementById('f_title').value, branch: document.getElementById('f_branch').value,
        format: document.getElementById('f_format').value, deadline: document.getElementById('f_deadline').value,
        priority: document.getElementById('f_priority').value, department: document.getElementById('f_department').value,
        details: document.getElementById('f_details').value, time: document.getElementById('f_time').value,
        imageBase64: "", drawBase64: currentDrawBase64
      };
      const fileInput = document.getElementById('f_image');
      if (fileInput.files.length > 0) { compressImage(fileInput.files[0], (base64) => { data.imageBase64 = base64; sendData(data, btn); }); } else { sendData(data, btn); }
    }

    function sendData(data, btn) {
      fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveTask', taskData: data }) })
      .then(res => res.json()).then(result => {
        if(result.status === 'success') {
          document.getElementById('taskForm').reset(); removeDrawing();
          loadTasks(); showSection('dashboard-sec');
        } else { alert("พบข้อผิดพลาด: " + result.message); }
      }).finally(() => { btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up me-2"></i> บันทึกข้อมูล'; btn.disabled = false; });
    }

    let recognizing = false; let recognition;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'th-TH'; recognition.interimResults = false;
      recognition.onresult = function(e) { document.getElementById('f_details').value += e.results[0][0].transcript + " "; };
      recognition.onend = function() { recognizing = false; document.getElementById('micBtn').classList.remove('recording'); };
      recognition.onerror = function() { alert("ไม่สามารถใช้ไมค์ได้"); recognizing = false; document.getElementById('micBtn').classList.remove('recording'); };
    } else { document.getElementById('micBtn').style.display = 'none'; }
    function toggleMic() { if (!recognition) return; if (recognizing) { recognition.stop(); return; } recognition.start(); recognizing = true; document.getElementById('micBtn').classList.add('recording'); }
  </script>
</body>
</html>
