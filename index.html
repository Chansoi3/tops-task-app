<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tops - Task Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, sans-serif; }
    .navbar { background-color: #e63946; color: white; }
    .task-card { border-radius: 10px; border-left: 5px solid #ccc; transition: transform 0.2s; cursor: pointer; }
    .task-card:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .priority-high { border-left-color: #dc3545; }
    .priority-medium { border-left-color: #ffc107; }
    .priority-low { border-left-color: #28a745; }
    .mic-btn { cursor: pointer; color: #e63946; font-size: 1.2rem; transition: 0.3s; }
    .mic-btn.recording { color: red; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark mb-4 p-3 shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-clipboard-list"></i> ระบบติดตามงาน</span>
      <button class="btn btn-light fw-bold" onclick="showSection('add-task-sec')"><i class="fa-solid fa-plus"></i> เพิ่มงาน</button>
    </div>
  </nav>

  <div class="container">
    <div id="dashboard-sec">
      <h4 class="mb-3"><i class="fa-solid fa-fire text-danger"></i> 10 งานที่ใกล้ถึงกำหนด</h4>
      <div id="task-list" class="row gy-3">
        <div class="text-center text-muted"><div class="spinner-border"></div> กำลังโหลดข้อมูล...</div>
      </div>
    </div>

    <div id="add-task-sec" class="card shadow-sm d-none">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="card-title mb-0 fw-bold">สร้างงานใหม่</h4>
          <button class="btn btn-outline-secondary btn-sm" onclick="showSection('dashboard-sec')">ยกเลิก</button>
        </div>
        
        <form id="taskForm" onsubmit="submitTask(event)">
          <div class="mb-3">
            <label class="form-label fw-bold">หัวข้องาน</label>
            <input type="text" class="form-control" id="f_title" required>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">เลือกสาขา</label>
              <select class="form-select" id="f_branch" onchange="autoSelectFormat()" required>
                <option value="">-- เลือกสาขา --</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Format (ระบบเลือกให้อัตโนมัติ)</label>
              <select class="form-select" id="f_format" required>
                <option value="">-- รอเลือกสาขา --</option>
                <option value="CO">CO</option>
                <option value="FC">FC</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">กำหนดการที่ต้องเสร็จ</label>
              <input type="date" class="form-control" id="f_deadline" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">ระดับความสำคัญ</label>
              <select class="form-select" id="f_priority" required>
                <option value="สูง">🔴 สูง (ด่วนมาก)</option>
                <option value="ปานกลาง">🟡 ปานกลาง</option>
                <option value="ต่ำ">🟢 ต่ำ</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">แผนกที่ต้องติดตาม</label>
              <input type="text" class="form-control" id="f_department" placeholder="เช่น IT, ก่อสร้าง" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold d-flex justify-content-between">
              รายละเอียดงาน 
              <span class="mic-btn" id="micBtn" onclick="toggleMic()"><i class="fa-solid fa-microphone"></i> พิมพ์ด้วยเสียง</span>
            </label>
            <textarea class="form-control" id="f_details" rows="3" placeholder="พิมพ์ หรือกดปุ่มไมค์เพื่อพูดข้อความ..."></textarea>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold"><i class="fa-solid fa-image"></i> แนบรูปภาพหน้างาน (ถ้ามี)</label>
            <input type="file" class="form-control" id="f_image" accept="image/*">
            <small class="text-muted">ระบบจะย่อขนาดรูปอัตโนมัติเพื่อให้โหลดได้รวดเร็วขึ้น</small>
          </div>

          <button type="submit" class="btn btn-danger w-100 fw-bold" id="saveBtn">บันทึกงาน</button>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-light">
          <h5 class="modal-title fw-bold" id="m_title"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p><strong>สาขา:</strong> <span id="m_branch"></span> (<span id="m_format"></span>)</p>
          <p><strong>แผนก:</strong> <span id="m_dept"></span> | <strong>สถานะ:</strong> <span class="badge bg-primary" id="m_status"></span></p>
          <p><strong>กำหนดส่ง:</strong> <span id="m_deadline" class="text-danger fw-bold"></span></p>
          <hr>
          <p><strong>รายละเอียด:</strong></p>
          <p id="m_details" class="bg-light p-2 rounded"></p>
          
          <div id="m_image_container" class="mt-3 text-center d-none">
            <p class="fw-bold mb-1">รูปภาพแนบ:</p>
            <img id="m_image" src="" class="img-fluid rounded border" style="max-height: 250px;">
          </div>
        </div>
        <div class="modal-footer">
          <input type="hidden" id="m_row">
          <button type="button" class="btn btn-success w-100 fw-bold" onclick="markAsDone()">✅ ปิดงาน (เสร็จสิ้น)</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 🔴🔴🔴 นำ URL จาก Apps Script มาวางในบรรทัดด้านล่างนี้ 🔴🔴🔴
    const API_URL = "https://script.google.com/macros/s/AKfycbwBFTLE8Q_7T63l6dzkZuqqmsRnQvQRby0H6tcICOH9Ld2onRTJ00bYQ9jDGTJaC9bdDg/exec";

    const rawBranches = [
      "5285 แฟลตทหารเรือบางนา", "4697 พระราม 9 ซอย 49", "0877 ลาดพร้าว 102", "5291 บ้านเทพารักษ์", 
      "4278 ลาดพร้าว 132", "3118 ซอยเทพารักษ์ 8", "5298 ฟู้ด สต็อก พัฒนาการ 32", "5219 เฉลิมพระเกียรติ 30 แยก 14", 
      "5209 ซอย กุศลศิลป์", "0730 ซอย เพี้ยนพิณ 2", "6953 บางจากบางนาตราด ก.ม.7", "3104 เสรีอ่อนนุชวิลเลจ", 
      "6731 คาลเท็กซ์ ศรีนครินทร์", "4802 บางนา - ตราด กม.8", "3110 บางนาตราด กม. 6.5", "3100 เฉลิมพระเกียรติ 14 แยก 34", 
      "3106 ท็อปส์ เดลี่ เดอะพาร์คแลนด์", "3119 รามคำแหง 29.2", "2288 รามคำแหง 8 แยก 4"
    ];

    document.addEventListener('DOMContentLoaded', () => {
      rawBranches.sort();
      const branchSelect = document.getElementById('f_branch');
      rawBranches.forEach(b => {
        let opt = document.createElement('option');
        opt.value = b; opt.innerHTML = b;
        branchSelect.appendChild(opt);
      });
      loadTasks();
    });

    function autoSelectFormat() {
      const branchStr = document.getElementById('f_branch').value;
      const formatSelect = document.getElementById('f_format');
      if (!branchStr) { formatSelect.value = ''; return; }
      let code = branchStr.split(' ')[0].replace(/^0+/, ''); 
      let firstDigit = code.charAt(0);
      if (['1', '2', '3'].includes(firstDigit)) formatSelect.value = 'FC';
      else if (['4', '5', '6', '8'].includes(firstDigit)) formatSelect.value = 'CO';
      else formatSelect.value = ''; 
    }

    function showSection(id) {
      document.getElementById('dashboard-sec').classList.add('d-none');
      document.getElementById('add-task-sec').classList.add('d-none');
      document.getElementById(id).classList.remove('d-none');
      if(id === 'dashboard-sec') loadTasks();
    }

    function loadTasks() {
      const list = document.getElementById('task-list');
      list.innerHTML = `<div class="text-center text-muted"><div class="spinner-border"></div> กำลังโหลดข้อมูล...</div>`;
      
      fetch(API_URL + "?action=getTasks")
        .then(res => res.json())
        .then(tasks => renderTasks(tasks))
        .catch(err => {
          list.innerHTML = `<div class="alert alert-danger">❌ โหลดข้อมูลไม่สำเร็จ กรุณาตรวจสอบลิงก์ API: ${err}</div>`;
        });
    }

    function renderTasks(tasks) {
      const list = document.getElementById('task-list');
      if (tasks.error) { list.innerHTML = `<div class="alert alert-danger">${tasks.error}</div>`; return; }
      if (tasks.length === 0) { list.innerHTML = `<div class="alert alert-success text-center">🎉 ไม่มีงานค้างในระบบ เยี่ยมมาก!</div>`; return; }
      
      let html = '';
      tasks.forEach(task => {
        let borderClass = task.priority === 'สูง' ? 'priority-high' : (task.priority === 'ปานกลาง' ? 'priority-medium' : 'priority-low');
        let daysLeft = Math.ceil((new Date(task.deadline) - new Date()) / (1000 * 60 * 60 * 24));
        let timeIcon = daysLeft < 0 ? '🔥 เลยกำหนด!' : (daysLeft <= 3 ? '⏳ ใกล้ถึงกำหนด' : '📅 ปกติ');
        let hasImage = task.imageUrl ? ' <i class="fa-solid fa-image text-primary"></i>' : '';

        html += `
          <div class="col-12 col-md-6">
            <div class="card task-card p-3 shadow-sm ${borderClass}" onclick='openTaskModal(${JSON.stringify(task)})'>
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h6 class="mb-0 fw-bold">${task.title} ${hasImage}</h6>
              </div>
              <p class="mb-1 text-muted small"><i class="fa-solid fa-store"></i> ${task.branch}</p>
              <div class="d-flex justify-content-between align-items-center mt-2 small">
                <span class="text-muted fw-bold">${timeIcon}</span>
                <span class="badge bg-secondary">${task.priority}</span>
              </div>
            </div>
          </div>
        `;
      });
      list.innerHTML = html;
    }

    // --- ระบบพิมพ์ด้วยเสียง ---
    let recognizing = false;
    let recognition;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'th-TH';
      recognition.interimResults = false;
      recognition.onresult = function(e) { document.getElementById('f_details').value += e.results[0][0].transcript + " "; };
      recognition.onend = function() { recognizing = false; document.getElementById('micBtn').classList.remove('recording'); };
      recognition.onerror = function(e) { 
        alert("❌ เกิดข้อผิดพลาดกับไมโครโฟน กรุณาเช็คการตั้งค่าอนุญาตไมค์ของเบราว์เซอร์"); 
        recognizing = false; document.getElementById('micBtn').classList.remove('recording');
      };
    } else {
      document.getElementById('micBtn').style.display = 'none'; // ซ่อนถ้าอุปกรณ์ไม่รองรับ
    }

    function toggleMic() {
      if (!recognition) return alert("เบราว์เซอร์หรือโทรศัพท์ของคุณไม่รองรับระบบสั่งงานด้วยเสียงครับ");
      if (recognizing) { recognition.stop(); return; }
      recognition.start(); recognizing = true; document.getElementById('micBtn').classList.add('recording');
    }

    // --- ย่อขนาดและบีบอัดรูปภาพ ---
    function compressImage(file, callback) {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = e => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const scale = 800 / img.width;
          canvas.width = 800; canvas.height = img.height * scale;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          callback(canvas.toDataURL('image/jpeg', 0.7)); // คุณภาพ 70%
        }
      }
    }

    function submitTask(e) {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      btn.innerText = "กำลังบันทึกข้อมูล..."; btn.disabled = true;

      const data = {
        title: document.getElementById('f_title').value, branch: document.getElementById('f_branch').value,
        format: document.getElementById('f_format').value, deadline: document.getElementById('f_deadline').value,
        priority: document.getElementById('f_priority').value, department: document.getElementById('f_department').value,
        details: document.getElementById('f_details').value, imageBase64: ""
      };

      const fileInput = document.getElementById('f_image');
      if (fileInput.files.length > 0) {
        compressImage(fileInput.files[0], (base64) => { data.imageBase64 = base64; sendData(data, btn); });
      } else {
        sendData(data, btn);
      }
    }

    // --- ส่งข้อมูลไปยัง API ---
    function sendData(data, btn) {
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // ป้องกัน CORS
        body: JSON.stringify({ action: 'saveTask', taskData: data })
      })
      .then(res => res.json())
      .then(result => {
        if(result.status === 'success') {
          alert("บันทึกข้อมูลเรียบร้อย!");
          document.getElementById('taskForm').reset();
          document.getElementById('f_format').value = '';
          showSection('dashboard-sec');
        } else {
          alert("เกิดข้อผิดพลาด: " + result.message);
        }
      })
      .catch((err) => alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้: " + err))
      .finally(() => { btn.innerText = "บันทึกงาน"; btn.disabled = false; });
    }

    // --- เปิดหน้าต่างรายละเอียด ---
    const taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
    function openTaskModal(task) {
      document.getElementById('m_title').innerText = task.title; document.getElementById('m_branch').innerText = task.branch;
      document.getElementById('m_format').innerText = task.format; document.getElementById('m_dept').innerText = task.department;
      document.getElementById('m_status').innerText = task.status; document.getElementById('m_deadline').innerText = new Date(task.deadline).toLocaleDateString('th-TH');
      document.getElementById('m_details').innerText = task.details; document.getElementById('m_row').value = task.row;
      
      const imgContainer = document.getElementById('m_image_container');
      const imgElement = document.getElementById('m_image');
      if (task.imageUrl) { imgElement.src = task.imageUrl; imgContainer.classList.remove('d-none'); } 
      else { imgContainer.classList.add('d-none'); }
      taskModal.show();
    }

    // --- ปิดงาน ---
    function markAsDone() {
      const row = document.getElementById('m_row').value;
      fetch(API_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'completeTask', rowNumber: row })
      })
      .then(res => res.json())
      .then(() => { taskModal.hide(); loadTasks(); });
    }
  </script>
</body>

</html>
