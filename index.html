<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tops Task Management</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tops Task">
  <link rel="apple-touch-icon" href="icon.png"> 
  <link rel="icon" type="image/png" href="icon.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
    
    /* Navbar Gradient */
    .navbar { background: linear-gradient(90deg, #d32f2f 0%, #e53935 100%); color: white; padding-top: env(safe-area-inset-top); }
    
    /* Card Styles */
    .task-card { 
      border-radius: 12px; 
      border: none; 
      border-left: 6px solid #dee2e6; 
      transition: all 0.2s ease-in-out; 
      cursor: pointer; 
      background: #ffffff;
    }
    .task-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.05) !important; }
    .task-card:active { transform: scale(0.98); }
    
    /* Priority Borders */
    .priority-high { border-left-color: #dc3545; }
    .priority-medium { border-left-color: #ffc107; }
    .priority-low { border-left-color: #28a745; }
    
    /* Custom Elements */
    .status-badge { font-weight: 500; letter-spacing: 0.3px; padding: 6px 12px; border-radius: 20px; }
    .mic-btn { cursor: pointer; color: #d32f2f; font-size: 1rem; transition: 0.3s; padding: 5px 10px; border-radius: 20px; background: #ffeeee; font-weight: 500; }
    .mic-btn:hover { background: #ffdddd; }
    .mic-btn.recording { color: white; background: #dc3545; animation: pulse 1s infinite; }
    
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); } }
    
    /* Form Customization */
    .form-control, .form-select { border-radius: 8px; border: 1px solid #ced4da; padding: 10px 15px; }
    .form-control:focus, .form-select:focus { border-color: #d32f2f; box-shadow: 0 0 0 0.25rem rgba(211, 47, 47, 0.25); }
    label.fw-bold { color: #495057; font-size: 0.95rem; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark mb-4 p-3 shadow-sm sticky-top">
    <div class="container-fluid d-flex align-items-center">
      <div>
        <button class="btn btn-link text-white p-0 me-3 border-0 text-decoration-none" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
          <i class="fa-solid fa-bars fs-4"></i>
        </button>
        <span class="navbar-brand mb-0 h5 fw-bold tracking-wide">Tops Task Management</span>
      </div>
      <button class="btn btn-light text-danger fw-bold btn-sm px-3 rounded-pill shadow-sm" onclick="showSection('add-task-sec')">
        <i class="fa-solid fa-plus me-1"></i> เพิ่มงาน
      </button>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start border-0 shadow" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header bg-light border-bottom">
      <h6 class="offcanvas-title fw-bold text-dark"><i class="fa-solid fa-layer-group me-2 text-danger"></i>เมนูหลัก</h6>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
      <div class="list-group list-group-flush mt-2">
        <button class="list-group-item list-group-item-action py-3 fw-bold text-danger border-0" onclick="setFilterStatus('หน้าแรก')" data-bs-dismiss="offcanvas">
          <i class="fa-solid fa-fire fa-beat-fade me-3 w-20px text-center"></i> งานเร่งด่วน (10 ลำดับแรก)
        </button>
        <button class="list-group-item list-group-item-action py-3 border-0 text-dark" onclick="setFilterStatus('งานใหม่')" data-bs-dismiss="offcanvas">
          <i class="fa-solid fa-asterisk fa-spin me-3 w-20px text-center text-info"></i> งานใหม่
        </button>
        <button class="list-group-item list-group-item-action py-3 border-0 text-dark" onclick="setFilterStatus('กำลังดำเนินงาน')" data-bs-dismiss="offcanvas">
          <i class="fa-solid fa-spinner fa-spin-pulse me-3 w-20px text-center text-warning"></i> กำลังดำเนินงาน
        </button>
        <button class="list-group-item list-group-item-action py-3 border-0 text-dark" onclick="setFilterStatus('เสร็จสิ้น')" data-bs-dismiss="offcanvas">
          <i class="fa-solid fa-circle-check me-3 w-20px text-center text-success"></i> เสร็จสิ้น
        </button>
      </div>
    </div>
  </div>

  <div class="container pb-5">
    
    <div id="dashboard-sec">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold text-dark" id="dashboard-title">
          <i class="fa-solid fa-fire fa-beat text-danger me-2"></i>รายการงานเร่งด่วน
        </h5>
      </div>

      <div class="input-group mb-4 shadow-sm rounded-3">
        <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-filter"></i></span>
        <select id="branchFilter" class="form-select border-start-0" onchange="applyFilters()">
          <option value="">แสดงทุกสาขา</option>
        </select>
      </div>

      <div id="task-list" class="row gy-3">
        <div class="text-center text-muted mt-5">
          <div class="spinner-border text-danger mb-2" role="status"></div>
          <p>กำลังโหลดข้อมูล...</p>
        </div>
      </div>
    </div>

    <div id="add-task-sec" class="card shadow-sm border-0 d-none rounded-4">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="card-title mb-0 fw-bold text-dark">สร้างรายการงานใหม่</h5>
          <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" onclick="showSection('dashboard-sec')">ยกเลิก</button>
        </div>
        
        <form id="taskForm" onsubmit="submitTask(event)">
          <div class="mb-3">
            <label class="form-label fw-bold">หัวข้อรายการ</label>
            <input type="text" class="form-control" id="f_title" placeholder="ระบุหัวข้องาน" required>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">สาขาที่ปฏิบัติงาน</label>
              <select class="form-select" id="f_branch" onchange="autoSelectFormat()" required>
                <option value="">-- กรุณาเลือกสาขา --</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">รูปแบบสาขา (Format)</label>
              <select class="form-select bg-light" id="f_format" required>
                <option value="">-- ระบบกำหนดอัตโนมัติ --</option>
                <option value="CO">CO</option>
                <option value="FC">FC</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">กำหนดเสร็จสิ้น</label>
              <input type="date" class="form-control" id="f_deadline" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">ระดับความสำคัญ</label>
              <select class="form-select" id="f_priority" required>
                <option value="สูง">ระดับสูง (เร่งด่วน)</option>
                <option value="ปานกลาง">ระดับปานกลาง</option>
                <option value="ต่ำ">ระดับต่ำ</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">แผนกผู้รับผิดชอบ</label>
              <input type="text" class="form-control" id="f_department" placeholder="เช่น IT, ก่อสร้าง" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold d-flex justify-content-between align-items-center w-100">
              รายละเอียดการดำเนินงาน
              <span class="mic-btn shadow-sm" id="micBtn" onclick="toggleMic()">
                <i class="fa-solid fa-microphone"></i> พิมพ์ด้วยเสียง
              </span>
            </label>
            <textarea class="form-control" id="f_details" rows="4" placeholder="ระบุรายละเอียดงาน หรือใช้ระบบพิมพ์ด้วยเสียง"></textarea>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">ภาพถ่ายประกอบ (ถ้ามี)</label>
            <input type="file" class="form-control" id="f_image" accept="image/*">
            <small class="text-muted mt-1 d-block">ระบบจะดำเนินการบีบอัดขนาดภาพอัตโนมัติ</small>
          </div>
          <button type="submit" class="btn btn-danger w-100 fw-bold py-2 rounded-pill shadow-sm" id="saveBtn">
            <i class="fa-solid fa-cloud-arrow-up me-2"></i>บันทึกข้อมูล
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content border-0 shadow-lg rounded-4">
        <div class="modal-header bg-light border-bottom-0 pb-0 pt-4 px-4">
          <h5 class="modal-title fw-bold text-dark">รายละเอียดรายการงาน</h5>
          <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body px-4 pt-3">
          <div class="bg-light p-3 rounded-3 mb-3 border">
            <div class="row mb-2">
              <div class="col-5 text-muted small">สาขา:</div>
              <div class="col-7 fw-bold text-dark"><span id="m_branch"></span> (<span id="m_format"></span>)</div>
            </div>
            <div class="row">
              <div class="col-5 text-muted small">กำหนดเสร็จ:</div>
              <div class="col-7 fw-bold text-danger"><i class="fa-regular fa-calendar-xmark me-1"></i> <span id="m_deadline"></span></div>
            </div>
          </div>
          
          <input type="hidden" id="m_row">
          
          <div class="mb-3">
            <label class="fw-bold text-dark small mb-1">หัวข้อรายการ</label>
            <input type="text" id="m_title_edit" class="form-control bg-white">
          </div>

          <div class="mb-3">
            <label class="fw-bold text-dark small mb-1">สถานะปัจจุบัน</label>
            <select id="m_status_edit" class="form-select bg-white fw-bold">
              <option value="งานใหม่">งานใหม่</option>
              <option value="เปิดงานใหม่" class="d-none">เปิดงานใหม่</option>
              <option value="กำลังดำเนินงาน">กำลังดำเนินงาน</option>
              <option value="เสร็จสิ้น">เสร็จสิ้น</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="fw-bold text-dark small mb-1">รายละเอียดการดำเนินงาน</label>
            <textarea id="m_details_edit" class="form-control bg-white" rows="4"></textarea>
          </div>
          
          <div id="m_image_container" class="mt-3 text-center d-none">
            <label class="fw-bold text-dark small mb-2 d-block text-start">ภาพประกอบ</label>
            <img id="m_image" src="" class="img-fluid rounded-3 border shadow-sm" style="max-height: 250px;">
          </div>
        </div>
        <div class="modal-footer border-top-0 px-4 pb-4">
          <button type="button" class="btn btn-dark w-100 fw-bold py-2 rounded-pill shadow-sm" onclick="saveTaskEdit()" id="modalSaveBtn">
            <i class="fa-solid fa-floppy-disk me-2"></i>บันทึกการปรับปรุงข้อมูล
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 🔴🔴🔴 วาง URL ของ Google Apps Script ที่นี่ 🔴🔴🔴
    const API_URL = "https://script.google.com/macros/s/AKfycbwBFTLE8Q_7T63l6dzkZuqqmsRnQvQRby0H6tcICOH9Ld2onRTJ00bYQ9jDGTJaC9bdDg/exec";

    const rawBranches = [
      "5285 แฟลตทหารเรือบางนา", "4697 พระราม 9 ซอย 49", "0877 ลาดพร้าว 102", "5291 บ้านเทพารักษ์", 
      "4278 ลาดพร้าว 132", "3118 ซอยเทพารักษ์ 8", "5298 ฟู้ด สต็อก พัฒนาการ 32", "5219 เฉลิมพระเกียรติ 30 แยก 14", 
      "5209 ซอย กุศลศิลป์", "0730 ซอย เพี้ยนพิณ 2", "6953 บางจากบางนาตราด ก.ม.7", "3104 เสรีอ่อนนุชวิลเลจ", 
      "6731 คาลเท็กซ์ ศรีนครินทร์", "4802 บางนา - ตราด กม.8", "3110 บางนาตราด กม. 6.5", "3100 เฉลิมพระเกียรติ 14 แยก 34", 
      "3106 ท็อปส์ เดลี่ เดอะพาร์คแลนด์", "3119 รามคำแหง 29.2", "2288 รามคำแหง 8 แยก 4"
    ];

    let allTasksData = [];
    let currentStatusFilter = 'หน้าแรก';

    document.addEventListener('DOMContentLoaded', () => {
      rawBranches.sort();
      const branchSelect = document.getElementById('f_branch');
      const dashboardBranchSelect = document.getElementById('branchFilter');
      
      rawBranches.forEach(b => {
        let opt1 = document.createElement('option'); opt1.value = b; opt1.innerHTML = b; branchSelect.appendChild(opt1);
        let opt2 = document.createElement('option'); opt2.value = b; opt2.innerHTML = b; dashboardBranchSelect.appendChild(opt2);
      });
      loadTasks();
    });

    function autoSelectFormat() {
      const branchStr = document.getElementById('f_branch').value;
      const formatSelect = document.getElementById('f_format');
      if (!branchStr) { formatSelect.value = ''; return; }
      let code = branchStr.split(' ')[0].replace(/^0+/, ''); 
      let firstDigit = code.charAt(0);
      if (['1', '2', '3'].includes(firstDigit)) formatSelect.value = 'FC';
      else if (['4', '5', '6', '7', '8'].includes(firstDigit)) formatSelect.value = 'CO';
      else formatSelect.value = ''; 
    }

    function showSection(id) {
      document.getElementById('dashboard-sec').classList.add('d-none');
      document.getElementById('add-task-sec').classList.add('d-none');
      document.getElementById(id).classList.remove('d-none');
      if(id === 'dashboard-sec') applyFilters();
    }

    function loadTasks() {
      const list = document.getElementById('task-list');
      list.innerHTML = `<div class="text-center text-muted mt-5"><div class="spinner-border text-danger mb-2"></div><p>กำลังเชื่อมต่อฐานข้อมูล...</p></div>`;
      
      fetch(API_URL)
        .then(res => res.json())
        .then(tasks => {
          if (tasks.error) { list.innerHTML = `<div class="alert alert-danger shadow-sm border-0">เกิดข้อผิดพลาดในการดึงข้อมูล: ${tasks.error}</div>`; return; }
          allTasksData = tasks;
          applyFilters(); 
        })
        .catch(err => { list.innerHTML = `<div class="alert alert-danger shadow-sm border-0"><i class="fa-solid fa-triangle-exclamation me-2"></i>ไม่สามารถเชื่อมต่อระบบฐานข้อมูลได้</div>`; });
    }

    function setFilterStatus(status) {
      currentStatusFilter = status;
      let titleIcon = '';
      if(status === 'หน้าแรก') titleIcon = '<i class="fa-solid fa-fire fa-beat text-danger me-2"></i>รายการงานเร่งด่วน';
      else if(status === 'งานใหม่') titleIcon = '<i class="fa-solid fa-asterisk fa-spin text-info me-2"></i>รายการงานใหม่';
      else if(status === 'กำลังดำเนินงาน') titleIcon = '<i class="fa-solid fa-spinner fa-spin-pulse text-warning me-2"></i>อยู่ระหว่างดำเนินการ';
      else titleIcon = '<i class="fa-solid fa-circle-check text-success me-2"></i>รายการที่เสร็จสิ้น';
      
      document.getElementById('dashboard-title').innerHTML = titleIcon;
      applyFilters();
    }

    function applyFilters() {
      const branchVal = document.getElementById('branchFilter').value;
      let filtered = allTasksData;

      if (branchVal !== '') filtered = filtered.filter(t => t.branch === branchVal);

      if (currentStatusFilter === 'หน้าแรก') {
        filtered = filtered.filter(t => t.status !== 'เสร็จสิ้น').slice(0, 10); 
      } else {
        filtered = filtered.filter(t => t.status === currentStatusFilter || (currentStatusFilter === 'งานใหม่' && t.status === 'เปิดงานใหม่'));
      }
      renderTasks(filtered);
    }

    function renderTasks(tasks) {
      const list = document.getElementById('task-list');
      if (tasks.length === 0) { 
        list.innerHTML = `
          <div class="col-12 mt-4 text-center text-muted">
            <div class="bg-white p-5 rounded-4 shadow-sm border">
              <i class="fa-regular fa-folder-open fs-1 text-black-50 mb-3"></i>
              <h5>ไม่พบรายการข้อมูลในหมวดหมู่นี้</h5>
            </div>
          </div>`; 
        return; 
      }
      
      let html = '';
      tasks.forEach(task => {
        let borderClass = task.priority === 'สูง' ? 'priority-high' : (task.priority === 'ปานกลาง' ? 'priority-medium' : 'priority-low');
        
        // การตั้งค่าป้ายสถานะและไอคอนเคลื่อนไหว
        let statusBadge = '';
        if(task.status.includes('ใหม่')) {
          statusBadge = '<span class="status-badge bg-info text-dark shadow-sm"><i class="fa-solid fa-asterisk fa-spin me-1"></i> งานใหม่</span>';
        } else if(task.status === 'เสร็จสิ้น') {
          statusBadge = '<span class="status-badge bg-success text-white shadow-sm"><i class="fa-solid fa-check me-1"></i> เสร็จสิ้น</span>';
        } else {
          statusBadge = '<span class="status-badge bg-warning text-dark shadow-sm"><i class="fa-solid fa-spinner fa-spin-pulse me-1"></i> ดำเนินการ</span>';
        }

        // การตั้งค่าไอคอนวันที่แจ้งเตือน
        let daysLeft = Math.ceil((new Date(task.deadline) - new Date()) / (1000 * 60 * 60 * 24));
        let timeDisplay = '';
        if (task.status === 'เสร็จสิ้น') {
           timeDisplay = `<span class="text-success small fw-bold"><i class="fa-regular fa-calendar-check me-1"></i> ปิดงานแล้ว</span>`;
        } else if (daysLeft < 0) {
           timeDisplay = `<span class="text-danger small fw-bold"><i class="fa-solid fa-triangle-exclamation fa-fade me-1"></i> เลยกำหนด ${Math.abs(daysLeft)} วัน</span>`;
        } else if (daysLeft <= 3) {
           timeDisplay = `<span class="text-warning text-dark small fw-bold"><i class="fa-regular fa-bell fa-shake me-1"></i> เหลือ ${daysLeft} วัน</span>`;
        } else {
           timeDisplay = `<span class="text-secondary small fw-bold"><i class="fa-regular fa-calendar me-1"></i> ${new Date(task.deadline).toLocaleDateString('th-TH')}</span>`;
        }

        let hasImage = task.imageUrl ? ' <i class="fa-solid fa-paperclip text-secondary ms-1" title="มีไฟล์แนบ"></i>' : '';

        html += `
          <div class="col-12 col-md-6">
            <div class="card task-card p-3 shadow-sm ${borderClass}" onclick='openTaskModal(${JSON.stringify(task)})'>
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h6 class="mb-0 fw-bold text-dark lh-base pe-2">${task.title}${hasImage}</h6>
                <div>${statusBadge}</div>
              </div>
              <p class="mb-1 text-muted small"><i class="fa-solid fa-location-dot me-1 text-secondary"></i> ${task.branch}</p>
              <div class="d-flex justify-content-between align-items-center mt-3 border-top pt-2">
                ${timeDisplay}
                <span class="text-muted small">ระดับ: ${task.priority}</span>
              </div>
            </div>
          </div>
        `;
      });
      list.innerHTML = html;
    }

    const taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
    function openTaskModal(task) {
      document.getElementById('m_row').value = task.row;
      document.getElementById('m_branch').innerText = task.branch;
      document.getElementById('m_format').innerText = task.format;
      document.getElementById('m_deadline').innerText = new Date(task.deadline).toLocaleDateString('th-TH');
      
      document.getElementById('m_title_edit').value = task.title;
      document.getElementById('m_details_edit').value = task.details;
      document.getElementById('m_status_edit').value = task.status;
      
      const imgContainer = document.getElementById('m_image_container');
      const imgElement = document.getElementById('m_image');
      if (task.imageUrl) { imgElement.src = task.imageUrl; imgContainer.classList.remove('d-none'); } 
      else { imgContainer.classList.add('d-none'); }
      
      taskModal.show();
    }

    function saveTaskEdit() {
      const btn = document.getElementById('modalSaveBtn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>กำลังดำเนินการ...'; 
      btn.disabled = true;

      const updatedData = {
        row: document.getElementById('m_row').value,
        title: document.getElementById('m_title_edit').value,
        status: document.getElementById('m_status_edit').value,
        details: document.getElementById('m_details_edit').value
      };

      fetch(API_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'updateTask', taskData: updatedData })
      })
      .then(res => res.json())
      .then(() => { 
        taskModal.hide(); 
        loadTasks(); 
      })
      .finally(() => { 
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk me-2"></i>บันทึกการปรับปรุงข้อมูล'; 
        btn.disabled = false; 
      });
    }

    // Web Speech API
    let recognizing = false; let recognition;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'th-TH'; recognition.interimResults = false;
      recognition.onresult = function(e) { document.getElementById('f_details').value += e.results[0][0].transcript + " "; };
      recognition.onend = function() { recognizing = false; document.getElementById('micBtn').classList.remove('recording'); };
      recognition.onerror = function(e) { alert("ไม่สามารถเข้าถึงไมโครโฟนได้ กรุณาตรวจสอบการตั้งค่า"); recognizing = false; document.getElementById('micBtn').classList.remove('recording'); };
    } else { document.getElementById('micBtn').style.display = 'none'; }

    function toggleMic() {
      if (!recognition) return alert("อุปกรณ์ของคุณไม่รองรับระบบสั่งงานด้วยเสียง");
      if (recognizing) { recognition.stop(); return; }
      recognition.start(); recognizing = true; document.getElementById('micBtn').classList.add('recording');
    }

    // Image Compression
    function compressImage(file, callback) {
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = e => {
        const img = new Image(); img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas'); const scale = Math.min(800 / img.width, 800 / img.height, 1);
          canvas.width = img.width * scale; canvas.height = img.height * scale;
          const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          callback(canvas.toDataURL('image/jpeg', 0.7));
        }
      }
    }

    function submitTask(e) {
      e.preventDefault();
      const btn = document.getElementById('saveBtn'); 
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>กำลังบันทึกข้อมูล...'; 
      btn.disabled = true;

      const data = {
        title: document.getElementById('f_title').value, branch: document.getElementById('f_branch').value,
        format: document.getElementById('f_format').value, deadline: document.getElementById('f_deadline').value,
        priority: document.getElementById('f_priority').value, department: document.getElementById('f_department').value,
        details: document.getElementById('f_details').value, imageBase64: ""
      };

      const fileInput = document.getElementById('f_image');
      if (fileInput.files.length > 0) { 
        compressImage(fileInput.files[0], (base64) => { data.imageBase64 = base64; sendData(data, btn); }); 
      } else { 
        sendData(data, btn); 
      }
    }

    function sendData(data, btn) {
      fetch(API_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'saveTask', taskData: data })
      })
      .then(res => res.json())
      .then(result => {
        if(result.status === 'success') {
          document.getElementById('taskForm').reset();
          document.getElementById('f_format').value = ''; 
          loadTasks(); 
          showSection('dashboard-sec');
        } else { 
          alert("พบข้อผิดพลาดจากเซิร์ฟเวอร์: " + result.message); 
        }
      })
      .catch(() => alert("ไม่สามารถส่งข้อมูลได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต"))
      .finally(() => { 
        btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up me-2"></i>บันทึกข้อมูล'; 
        btn.disabled = false; 
      });
    }
  </script>
</body>
</html>
